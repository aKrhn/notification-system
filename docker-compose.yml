services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: notifications
      POSTGRES_DB: notifications
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # migrate service added in Phase 2 when migration files exist
  # migrate:
  #   image: migrate/migrate:v4.18.1
  #   volumes:
  #     - ./migrations:/migrations
  #   command: ["-path", "/migrations", "-database", "postgres://notifications:notifications@postgres:5432/notifications?sslmode=disable", "up"]
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: on-failure

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://notifications:notifications@postgres:5432/notifications?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_URL: "redis://redis:6379/0"
      WEBHOOK_URL: "https://webhook.site/test"
      WORKER_COUNT: "3"
      MAX_RETRIES: "3"
      RATE_LIMIT: "100"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
